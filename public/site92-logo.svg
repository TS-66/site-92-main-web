<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a16;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#030807;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#009977;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Outer hexagon border -->
  <polygon points="100,8 178,54 178,146 100,192 22,146 22,54" fill="none" stroke="url(#borderGrad)" stroke-width="3" filter="url(#glow)" opacity="0.6"/>
  <!-- Inner hexagon -->
  <polygon points="100,20 168,60 168,140 100,180 32,140 32,60" fill="url(#shieldGrad)" stroke="#00ffcc" stroke-width="1.5" opacity="0.9"/>
  <!-- Arrow circle (SCP motif) -->
  <circle cx="100" cy="85" r="32" fill="none" stroke="#00ffcc" stroke-width="2" filter="url(#glow)"/>
  <!-- Three arrows pointing inward (SCP symbol) -->
  <g stroke="#00ffcc" stroke-width="2.5" fill="none" filter="url(#glow)">
    <line x1="100" y1="49" x2="100" y2="65"/>
    <polyline points="94,57 100,49 106,57"/>
    <line x1="132" y1="85" x2="116" y2="85"/>
    <polyline points="124,79 132,85 124,91"/>
    <line x1="68" y1="85" x2="84" y2="85"/>
    <polyline points="76,79 68,85 76,91"/>
  </g>
  <!-- Inner circle -->
  <circle cx="100" cy="85" r="12" fill="none" stroke="#00ffcc" stroke-width="1.5" opacity="0.7"/>
  <circle cx="100" cy="85" r="3" fill="#00ffcc" filter="url(#glow)"/>
  <!-- "SITE" text -->
  <text x="100" y="142" text-anchor="middle" font-family="'Orbitron', monospace" font-size="12" font-weight="700" fill="#00ffcc" letter-spacing="6" filter="url(#glow)">SITE</text>
  <!-- "92" large number -->
  <text x="100" y="172" text-anchor="middle" font-family="'Orbitron', monospace" font-size="28" font-weight="900" fill="#00ffcc" filter="url(#glow)">92</text>
</svg>